<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive visualization of EU forest policy domains for the OptFor-EU project"
    />

    <!-- Favicon loaded from the official OptFor-EU CDN, no local file needed -->
    <link
      rel="icon"
      type="image/png"
      href="https://optforeu.eu/wp-content/uploads/2023/04/Opt4EU-logo-ideas_no-background-768x768.png"
    />

    <title>OptFor-EU | Visualizing European Forest Policy</title>

    <!--
      Inter font from Google Fonts.
      "preconnect" tells the browser to open a connection early,
      so the font loads faster when it is actually requested.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      React mounts the entire app into this div.
      The id "root" must match ReactDOM.createRoot(document.getElementById("root"))
      in main.tsx — if you change one, change the other too.
    -->
    <div id="root"></div>

    <!--
      Entry point for the app.
      Vite automatically replaces this path with the correct hashed file
      name when you run "npm run build".
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
